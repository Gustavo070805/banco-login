<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

    <title>Cadastro</title>

</head>

<body>

    <main class="container">

        <form onsubmit="criarConta(event)">

            <h1>Criar Conta</h1>

            <div class="input-box">
                <input id="nome" type="text" placeholder="Nome completo" required>
                <i class='bx bxs-user'></i>
            </div>

            <div class="input-box">
                <input id="email" type="email" placeholder="Email" required>
                <i class='bx bxs-envelope'></i>
            </div>

            <div class="input-box">
                <input id="senha" type="password" placeholder="Senha" required>
                <i class='bx bxs-lock-alt'></i>
            </div>

            <div class="input-box">
                <input id="confirmar" type="password" placeholder="Confirmar senha" required>
                <i class='bx bxs-lock'></i>
            </div>

            <button type="submit">Cadastrar</button>

            <div class="register-link">
                <p>Já tem uma conta? <a href="index.html">Fazer login</a></p>
            </div>

        </form>

    </main>


    <script src="auth.js"></script>

    <script>

        function criarConta(event) {

            event.preventDefault();

            const nome = document.getElementById("nome").value;
            const email = document.getElementById("email").value;
            const senha = document.getElementById("senha").value;
            const confirmar = document.getElementById("confirmar").value;

            if (senha !== confirmar) {
                alert("As senhas não coincidem!");
                return;
            }

            cadastrarUsuario(nome, email, senha);

        }

    </script>

</body>

</html>
